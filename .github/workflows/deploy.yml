name: Deploy KENI para GitHub Pages

on:
  push:
    branches:
      - claude/keni-ecommerce-documentation-eNogd
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Build e Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Build (static export)
        run: npm run build
        env:
          GITHUB_PAGES: true

      - name: Deploy para branch gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          force_orphan: true
